# Suricata-update disable.conf — trims ET Open for a low-memory IoT Pi WITHOUT
# losing attack coverage. Each line drops a whole noisy/irrelevant category by
# its "ET <CATEGORY>" message prefix; the categories that cover the attacks we
# care about (WEB_SERVER, WEB_CLIENT, WEB_SPECIFIC_APPS, SQL, SHELLCODE, EXPLOIT,
# EXPLOIT_KIT, MALWARE, MOBILE_MALWARE, ATTACK_RESPONSE, SCAN, DOS, SCADA, JA3,
# CURRENT_EVENTS) are left ENABLED.
#
# Install:  sudo cp disable.conf /etc/suricata/disable.conf && sudo suricata-update
#
# Dropped = pure noise / not relevant to an IoT network (saves memory + cuts
# false positives), NOT attack signatures:
re:msg:"ET INFO
re:msg:"ET HUNTING
re:msg:"ET DYN_DNS
re:msg:"ET PHISHING
re:msg:"ET ADWARE_PUP
re:msg:"ET USER_AGENTS
re:msg:"ET GAMES
re:msg:"ET P2P
re:msg:"ET TOR
re:msg:"ET FILE_SHARING
re:msg:"GPL NETBIOS
